name: facegate
arch: amd64
platform: linux
version: ${FACEGATE_VERSION}
section: utils
priority: optional
maintainer: Facegate maintainers
description: Native facial authentication for Linux using PAM and ONNX Runtime.
homepage: https://github.com/me02329/facegate
license: MIT

contents:
  - src: target/release/facegate
    dst: /usr/bin/facegate
    file_info:
      mode: 0755

  - src: target/release/facegate-brokerd
    dst: /usr/bin/facegate-brokerd
    file_info:
      mode: 0755

  - src: target/release/libpam_facegate.so
    dst: /usr/lib/security/pam_facegate.so
    file_info:
      mode: 0755

  - src: config.example.toml
    dst: /etc/facegate/config.toml
    type: config|noreplace
    file_info:
      mode: 0644

  - src: systemd/facegate-watch.service
    dst: /usr/lib/systemd/user/facegate-watch.service
    file_info:
      mode: 0644

  - src: systemd/facegate-brokerd.service
    dst: /usr/lib/systemd/system/facegate-brokerd.service
    file_info:
      mode: 0644

  - src: docs/facegate.1
    dst: /usr/share/man/man1/facegate.1
    file_info:
      mode: 0644

archlinux:
  pkgbase: facegate
  packager: Facegate maintainers

scripts:
  postinstall: packaging/nfpm/scripts/postinstall.sh
