name: Release packages

on:
  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  packages:
    name: Build release packages
    runs-on: ubuntu-latest
    needs: rust

    env:
      HAS_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install nFPM
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Get Cargo version
        id: version
        run: |
          version=$(grep '^version' crates/facegate_cli/Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check tag matches Cargo version
        if: github.event_name == 'push'
        run: |
          expected="v${{ steps.version.outputs.version }}"
          actual="${GITHUB_REF_NAME}"

          echo "Cargo version: ${{ steps.version.outputs.version }}"
          echo "Git tag:       ${actual}"

          if [ "$actual" != "$expected" ]; then
            echo "Tag does not match Cargo version."
            echo "Expected: $expected"
            echo "Actual:   $actual"
            exit 1
          fi

      - name: Build packages
        env:
          FACEGATE_VERSION: ${{ steps.version.outputs.version }}
        run: scripts/package-nfpm.sh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.deb *.rpm *.pkg.tar.zst > checksums.sha256
          cat checksums.sha256

      - name: Import GPG key
        if: env.HAS_GPG_KEY == 'true'
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import

      - name: Sign packages
        if: env.HAS_GPG_KEY == 'true'
        run: |
          for f in dist/*.deb dist/*.rpm dist/*.pkg.tar.zst; do
            echo "${{ secrets.GPG_PASSPHRASE }}" \
              | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --detach-sign --armor "$f"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facegate-packages
          path: dist/*

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
