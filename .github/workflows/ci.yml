name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - dev

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  packages:
    runs-on: ubuntu-latest
    needs: rust
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write
    env:
      HAS_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install nFPM
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Get version
        id: version
        run: |
          version=$(grep '^version' crates/facegate_cli/Cargo.toml | cut -d'"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build packages
        env:
          FACEGATE_VERSION: ${{ steps.version.outputs.version }}
        run: scripts/package-nfpm.sh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.deb *.rpm > checksums.sha256
          cat checksums.sha256

      - name: Import GPG key
        if: env.HAS_GPG_KEY == 'true'
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import

      - name: Sign packages
        if: env.HAS_GPG_KEY == 'true'
        run: |
          for f in dist/*.deb dist/*.rpm; do
            echo "${{ secrets.GPG_PASSPHRASE }}" \
              | gpg --batch --passphrase-fd 0 --detach-sign --armor "$f"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facegate-packages
          path: dist/*

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
