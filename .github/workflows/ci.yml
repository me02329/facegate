name: CI

on:
  pull_request:
    branches:
      - master
      - dev
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/FUNDING.yml'
      - 'assets/**'
      - 'screenshots/**'

  push:
    branches:
      - master
      - dev
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/FUNDING.yml'
      - 'assets/**'
      - 'screenshots/**'

  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Pin to the same compiler version recorded in rust-toolchain.toml so
      # local and CI builds stay in lockstep. Bump both at the same time.
      # dtolnay/rust-toolchain has no versioned tags; pinning the action to
      # a master SHA is the supply-chain-safe equivalent.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-05-15
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace
