[camera]
# Pick the camera that points at you. On laptops with Windows-Hello-style
# hardware you have *two* devices: a normal RGB webcam (typically /dev/video0)
# and an IR / depth sensor (often /dev/video2 or /dev/video4). Both work for
# enrollment and recognition, but the IR camera is strongly preferred:
#
#   - it works in the dark, so screen-unlock keeps working at night;
#   - it's much harder to spoof with a printed photo than an RGB feed.
#
# To find which device is which:
#   sudo facegate cameras                 # lists all /dev/video* with format
#   v4l2-ctl --list-devices               # vendor names
#   v4l2-ctl --device /dev/videoN --list-formats
#
# Devices reporting GREY / Y8 / Y800 are the IR streams. Devices reporting
# only YUYV / MJPG are RGB.
device = "/dev/video0"
width = 640
height = 360
fps = 30
timeout_ms = 5000
warmup_frames = 3

[recognition]
threshold = 0.55
required_matches = 1
max_attempts = 3
min_face_size = 80

[models]
detector = "/usr/share/facegate/models/scrfd_500m.onnx"
embedder = "/usr/share/facegate/models/arcface_w600k_r50.onnx"

[storage]
base_dir = "/var/lib/facegate/users"

[logging]
level = "info"
log_failed_attempts = true

[security]
allow_password_fallback = true
deny_on_camera_error = false
